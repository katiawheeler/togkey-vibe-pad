name: TogkeyVibe
options:
  bundleIdPrefix: com.togkey
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: "Togkey Vibe"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  TogkeyVibe:
    type: application
    platform: macOS
    sources:
      - App
      - Models
      - Services
      - Views
      - path: Resources
        excludes:
          - "Info.plist"
          - "TogkeyVibe.entitlements"
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.togkey.vibe
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        LSUIElement: YES
        CODE_SIGN_ENTITLEMENTS: Resources/TogkeyVibe.entitlements

schemes:
  TogkeyVibe:
    build:
      targets:
        TogkeyVibe: all
    run:
      config: Debug
      commandLineArguments:
        "-NSApplicationCrashOnExceptions": true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
